# Server port (Render sets PORT env var)
server.port=${PORT:8080}

# PostgreSQL Database (override via env vars for deployment)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ctm_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Config
jwt.secret=${JWT_SECRET:compliance-training-manager-jwt-secret-key-2024-very-secure}
jwt.expiration=86400000

# Flask AI Service URL (override for deployment)
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}

# Seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
