version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ctm-postgres
    environment:
      POSTGRES_DB: ctm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build: ./backend
    container_name: ctm-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ctm_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AI_SERVICE_URL: http://ai-service:5000
    depends_on:
      postgres:
        condition: service_healthy

  # Flask AI Service
  ai-service:
    build: ./ai-service
    container_name: ctm-ai-service
    ports:
      - "5000:5000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - chromadata:/app/chroma_data

  # React Frontend
  frontend:
    build: ./frontend
    container_name: ctm-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  chromadata:
